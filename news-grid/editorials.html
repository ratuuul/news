<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global News Grid • Editorials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar container">
      <a class="brand" href="index.html">Global News Grid</a>
      <div class="topbar-actions">
        <select id="themeSelect" aria-label="Theme mode">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
        <a class="editorials-link" href="index.html">Headlines</a>
      </div>
    </header>

    <main class="container">
      <section id="editorialHero" class="hero card skeleton"></section>
      <section class="panel">
        <h2>Latest Editorials</h2>
        <div id="editorialGrid" class="news-grid editorial-grid"></div>
      </section>
    </main>

    <footer class="container footer">
      <p>Opinion stream from major editorial desks.</p>
    </footer>

    <script type="module">
      import { applyTheme, initThemeController } from './utils/theme.js';
      import { fetchEditorials } from './services/rss-parser.js';
      import { createEditorialCard } from './components/card.js';

      applyTheme(localStorage.getItem('gng-theme') || 'system');
      initThemeController(document.getElementById('themeSelect'));

      const hero = document.getElementById('editorialHero');
      const grid = document.getElementById('editorialGrid');

      (async () => {
        const items = await fetchEditorials();
        if (!items.length) {
          hero.classList.remove('skeleton');
          hero.innerHTML = '<h2>No editorials available now</h2><p>Try refreshing in a moment.</p>';
          return;
        }

        const [lead, ...rest] = items;
        hero.classList.remove('skeleton');
        hero.innerHTML = `
          <div class="hero-content">
            <p class="meta">Featured Opinion • ${lead.publication}</p>
            <h1>${lead.title}</h1>
            <p>${lead.description}</p>
            <p class="meta">${lead.author || 'Editorial Desk'} • ${new Date(lead.publishedAt).toLocaleString()}</p>
            <a class="readmore" href="${lead.url}" target="_blank" rel="noopener noreferrer">Read editorial</a>
          </div>
        `;

        rest.forEach((item) => grid.appendChild(createEditorialCard(item)));
      })();
    </script>
  </body>
</html>
