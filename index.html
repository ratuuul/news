<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global News Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar container">
      <a class="brand" href="index.html">Global News Grid</a>
      <div class="topbar-actions">
        <input id="searchInput" type="search" placeholder="Search headlines..." aria-label="Search headlines" />
        <select id="themeSelect" aria-label="Theme mode">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
        <a class="editorials-link" href="editorials.html">Editorials</a>
      </div>
    </header>

    <main class="container layout">
      <section>
        <article id="heroStory" class="hero card skeleton"></article>

        <section class="panel">
          <h2>Trending Headlines</h2>
          <ul id="trendingHeadlines" class="headline-list"></ul>
        </section>

        <section class="panel filters" id="filters"></section>

        <section id="clusteredGroups" class="panel">
          <h2>Story Clusters</h2>
          <div id="clusters"></div>
        </section>

        <section id="newsGrid" class="news-grid"></section>
      </section>

      <aside>
        <section class="panel sticky">
          <h2>Trending Topics</h2>
          <div id="topics" class="topics"></div>
        </section>
      </aside>
    </main>

    <footer class="container footer">
      <p>Global News Grid • Fast, readable, client-side world headlines dashboard.</p>
    </footer>

    <script type="module" src="script.js"></script>
  </body>
</html>
